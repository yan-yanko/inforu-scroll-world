  <!-- Hebrew webfonts (graceful fallback to system Hebrew fonts when offline) -->

  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@500;700;800&family=Assistant:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ---- inforu theme (matches the generated scenes' background + palette) ---- */
    :root, .sw-root {
      --sw-bg: #EDF1FB;            /* == the scene island background */
      --sw-ink: #0E1430;           /* deep navy text */
      --sw-ink-soft: #5b6480;
      --sw-accent: #2E6BFF;        /* inforu blue; each section overrides at runtime */
      --sw-font-display: 'Rubik', 'Assistant', 'Segoe UI', system-ui, sans-serif;
      --sw-font-body: 'Assistant', 'Heebo', 'Segoe UI', system-ui, sans-serif;
    }
    html, body { margin: 0; background: var(--sw-bg); }

    /* ---- RTL mirroring (unlayered → wins over the engine's @layer sw defaults) ---- */
    /* Copy block: pin to the right instead of the left. */
    .sw-root .sw-copy { left: auto; right: clamp(18px, 5vw, 64px); }
    /* Readability scrim: fade from the right edge. */
    .sw-root .sw-copylayer::before {
      left: auto; right: 0;
      background: linear-gradient(270deg,
        var(--sw-bg) 0%,
        color-mix(in srgb, var(--sw-bg) 82%, transparent) 34%,
        color-mix(in srgb, var(--sw-bg) 40%, transparent) 62%,
        transparent 100%);
    }
    /* Route rail: mirror to the left so it sits opposite the copy. */
    .sw-root .sw-route { right: auto; left: clamp(14px, 2.4vw, 30px); }
    .sw-root .sw-route__label {
      right: auto; left: 24px;
      transform: translateY(-50%) translateX(-6px);
    }
    .sw-root .sw-route__dot:hover .sw-route__label,
    .sw-root .sw-route__dot.is-active .sw-route__label {
      transform: translateY(-50%) translateX(0);
    }
    /* Numeric section index stays LTR so "01 / 06" reads correctly. */
    .sw-root .sw-copy__num { direction: ltr; unicode-bidi: isolate; }

    /* Robustness: keep the still poster visible BENEATH the video (video sits at
       z-index 1 and is opaque when painted). This guarantees a scene never goes
       blank if a browser/GPU drops the seeked frame of a muted, paused video. */
    .sw-root .sw-scene.has-clip .sw-scene__still { opacity: 1; }

    @media (max-width: 860px) {
      /* On phones the copy is full-width bottom; keep the rail on the left edge. */
      .sw-root .sw-route { left: 6px; right: auto; }
      /* Bottom scrim covers full width already — flip not needed. */
      .sw-root .sw-copylayer::before { right: 0; left: 0; }
    }
  </style>

  <script>
    /* Guarantee the still posters actually load, so the always-visible poster
       underlay (see CSS) is a real fallback if a browser/GPU drops a video frame.
       The engine marks the <img> stills loading="lazy"; force them eager so the
       scene can never show a blank poster. Runs after the engine has built the DOM. */
    (function eagerPosters() {
      const warm = () => document.querySelectorAll('.sw-scene__still').forEach((img) => {
        img.loading = 'eager';
        if (!img.complete || !img.naturalWidth) {
          const s = img.getAttribute('src'); if (s) img.setAttribute('src', s); // retrigger load
        }
      });
      // a couple of passes: the engine creates scenes over the first frames
      warm();
      setTimeout(warm, 300);
      setTimeout(warm, 1200);
    })();
  </script>
